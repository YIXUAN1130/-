<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>벚꽃 심리 테스트</title>

  <!-- jhammann/sakura 벚꽃 플러그인 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.css">

  <style>
    :root{
      --text-main:#866b79;
      --text-soft:#967d89;
      --line:rgba(215,186,198,.55);
      --btn1:#cdbaf4;
      --btn2:#d98fad;
      --white-soft:rgba(255,250,251,.78);
      --white-border:rgba(233,210,220,.7);
      --shadow:0 16px 40px rgba(140,95,118,.16);
      --shadow-soft:0 10px 28px rgba(140,95,118,.1);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      width:100%;
      height:100%;
    }

    body{
      font-family:"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
      color:var(--text-main);
      background:
        linear-gradient(rgba(255,244,248,.03), rgba(255,244,248,.03)),
        url("./0.png") center center / cover no-repeat;
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          to right,
          rgba(255,246,249,.12) 0%,
          rgba(255,246,249,.08) 28%,
          rgba(255,246,249,.04) 52%,
          rgba(255,246,249,.01) 68%,
          rgba(255,246,249,0) 100%
        );
      pointer-events:none;
      z-index:0;
    }

    /* 벚꽃 플러그인 레이어 */
    .sakura{
      pointer-events:none !important;
      z-index:3 !important;
    }

    .page{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      padding:34px 42px 42px;
    }

    .logo{
      position:absolute;
      left:46px;
      top:34px;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:19px;
      font-weight:600;
      letter-spacing:1px;
      color:rgba(126,101,114,.82);
      z-index:4;
    }

    .logo-box{
      width:22px;
      height:22px;
      border:2px solid rgba(126,101,114,.74);
      border-radius:7px;
      position:relative;
      display:inline-block;
    }

    .logo-box::after{
      content:"";
      position:absolute;
      inset:4px;
      border:2px solid rgba(126,101,114,.45);
      border-radius:4px;
    }

    .layout{
      width:100%;
      height:100%;
      position:relative;
    }

    .left{
      width:420px;
      position:absolute;
      left:27%;
      top:40%;
      transform:translate(-50%, -50%);
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      z-index:4;
      isolation:isolate;
    }

    /* 只在文字附近的局部雾感 */
    .left::before{
      content:"";
      position:absolute;
      left:-72px;
      top:-58px;
      width:520px;
      height:470px;
      border-radius:52px;
      z-index:-1;
      pointer-events:none;
      background:
        radial-gradient(
          ellipse at 36% 34%,
          rgba(255,246,249,.18) 0%,
          rgba(255,246,249,.11) 38%,
          rgba(255,246,249,.05) 66%,
          rgba(255,246,249,0) 100%
        );
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      mask-image: radial-gradient(
        ellipse at center,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,.88) 54%,
        rgba(0,0,0,.40) 78%,
        rgba(0,0,0,0) 100%
      );
      -webkit-mask-image: radial-gradient(
        ellipse at center,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,.88) 54%,
        rgba(0,0,0,.40) 78%,
        rgba(0,0,0,0) 100%
      );
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:10px 18px;
      border-radius:999px;
      background:rgba(255,247,250,.22);
      border:1px solid rgba(233,213,221,.52);
      color:rgba(147,118,131,.8);
      font-size:13px;
      letter-spacing:2px;
      backdrop-filter:blur(8px);
      box-shadow:var(--shadow-soft);
      margin-bottom:28px;
    }

    h1{
      font-family:Georgia,"Times New Roman","Apple SD Gothic Neo","Malgun Gothic",serif;
      font-size:68px;
      line-height:.96;
      font-weight:500;
      letter-spacing:-1.2px;
      color:#8c7180;
      margin-bottom:22px;
      position:relative;
    }

    h1 .line2{
      display:block;
      margin-top:6px;
    }

    .swish{
      position:absolute;
      left:116px;
      bottom:-10px;
      width:210px;
      height:24px;
      border-bottom:2px solid rgba(233,170,194,.62);
      border-radius:0 0 160px 160px;
      transform:rotate(-5deg);
      opacity:.9;
    }

    .swish::after{
      content:"✿";
      position:absolute;
      right:-10px;
      top:7px;
      font-size:22px;
      color:rgba(232,165,192,.85);
    }

    .desc{
      font-size:17px;
      line-height:1.65;
      color:var(--text-soft);
      max-width:350px;
      margin-bottom:18px;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:16px;
      color:rgba(152,125,137,.82);
      font-size:15px;
      margin:10px 0 14px;
    }

    .divider::before,
    .divider::after{
      content:"";
      width:72px;
      height:1px;
      background:var(--line);
    }

    .sub{
      font-size:15px;
      color:var(--text-soft);
      margin-bottom:28px;
    }

    .start-btn{
      border:none;
      cursor:pointer;
      min-width:230px;
      padding:16px 32px;
      border-radius:999px;
      color:#fff;
      font-size:17px;
      font-weight:600;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      background:linear-gradient(90deg,var(--btn1),var(--btn2));
      box-shadow:0 14px 34px rgba(210,151,180,.25);
      transition:.25s ease;
      margin-bottom:28px;
    }

    .start-btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.03);
      box-shadow:0 18px 40px rgba(210,151,180,.3);
    }

    .start-btn .sparkle{
      font-size:16px;
      opacity:.95;
    }

    .actions{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .soft-btn{
      min-width:184px;
      padding:14px 22px;
      border-radius:999px;
      background:rgba(255,250,251,.62);
      border:1px solid var(--white-border);
      color:#8b7280;
      font-size:15px;
      font-weight:500;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow-soft);
      cursor:pointer;
      transition:.22s ease;
    }

    .soft-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,250,251,.78);
    }

    .right{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
    }

    .bubble-tip{
      position:absolute;
      right:140px;
      bottom:64px;
      text-align:right;
      color:rgba(255,243,247,.92);
      text-shadow:0 2px 10px rgba(125,94,108,.14);
      font-size:14px;
      line-height:1.55;
      pointer-events:auto;
    }

    .bubble-tip span{
      display:block;
      font-size:13px;
      margin-top:4px;
      opacity:.92;
    }

    .bubble{
      position:absolute;
      right:42px;
      bottom:38px;
      width:84px;
      height:84px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      background:rgba(255,246,249,.28);
      border:1px solid rgba(255,240,244,.44);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:0 10px 30px rgba(185,145,166,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.22s ease;
      overflow:hidden;
      pointer-events:auto;
    }

    .bubble::before{
      content:"";
      position:absolute;
      inset:-8px;
      border-radius:50%;
      border:1px solid rgba(255,245,249,.34);
      animation:pulse 2.6s infinite ease-out;
    }

    .bubble:hover{
      transform:scale(1.08);
      background:rgba(255,246,249,.40);
      box-shadow:0 14px 34px rgba(185,145,166,.22);
    }

    .bubble:active{
      transform:scale(.96);
    }

    .bubble-icon{
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(255,220,230,.78), rgba(244,188,209,.72));
      box-shadow:inset 0 2px 8px rgba(255,255,255,.28);
      color:#fff;
      font-size:22px;
      z-index:1;
    }

    .panel{
      position:absolute;
      right:64px;
      bottom:140px;
      width:332px;
      border-radius:28px;
      padding:22px 22px 20px;
      background:rgba(255,244,247,.50);
      border:1px solid rgba(255,240,244,.72);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:0 22px 48px rgba(168,128,149,.16);
      color:#866b79;
      opacity:0;
      transform:translateY(24px) scale(.96);
      pointer-events:none;
      transition:opacity .32s ease, transform .32s ease;
    }

    .panel.show{
      opacity:1;
      transform:translateY(0) scale(1);
      pointer-events:auto;
    }

    .panel-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:10px;
    }

    .panel-title{
      font-size:26px;
      font-weight:700;
      color:#7d6270;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .panel-sub{
      font-size:15px;
      line-height:1.5;
      color:#9b808d;
      margin-bottom:14px;
    }

    .close{
      border:none;
      background:transparent;
      color:#aa8d9a;
      font-size:28px;
      line-height:1;
      cursor:pointer;
    }

    .panel textarea{
      width:100%;
      height:146px;
      resize:none;
      outline:none;
      border-radius:20px;
      border:1px solid rgba(232,215,221,.92);
      background:rgba(255,251,252,.72);
      padding:16px;
      color:#7f6774;
      font-size:15px;
      line-height:1.7;
      font-family:inherit;
      margin-bottom:16px;
    }

    .panel textarea::placeholder{
      color:#b59ca8;
    }

    .panel-footer{
      display:flex;
      justify-content:flex-end;
    }

    .send{
      border:none;
      cursor:pointer;
      padding:12px 24px;
      border-radius:999px;
      color:white;
      font-size:15px;
      font-weight:600;
      background:linear-gradient(90deg,#f0bed1,#d88dad);
      box-shadow:0 10px 22px rgba(216,141,173,.22);
    }

    @keyframes pulse{
      0%{
        opacity:.5;
        transform:scale(.92);
      }
      70%{
        opacity:0;
        transform:scale(1.26);
      }
      100%{
        opacity:0;
        transform:scale(1.26);
      }
    }

    @media (max-width: 1100px){
      .left{
        width:370px;
        left:29%;
        top:40%;
        transform:translate(-50%, -50%);
      }

      .left::before{
        left:-62px;
        top:-50px;
        width:460px;
        height:430px;
      }

      h1{
        font-size:58px;
      }

      .panel{
        width:300px;
      }
    }

    @media (max-width: 900px){
      body{
        overflow-y:auto;
      }

      .page{
        padding:24px;
        min-height:100vh;
      }

      .layout{
        min-height:100vh;
        position:relative;
      }

      .left{
        width:320px;
        left:43%;
        top:35%;
        transform:translate(-50%, -50%);
      }

      .left::before{
        left:-48px;
        top:-34px;
        width:390px;
        height:360px;
      }

      h1{
        font-size:42px;
        line-height:1.15;
      }

      .actions{
        flex-direction:column;
        width:100%;
      }

      .soft-btn{
        min-width:0;
        width:100%;
      }

      .bubble-tip{
        display:none;
      }

      .bubble{
        right:24px;
        bottom:28px;
      }

      .panel{
        right:24px;
        bottom:122px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="logo">
      <span class="logo-box"></span>
      <span>마음숲</span>
    </div>

    <div class="layout">
      <section class="left">
        <div class="tag">벚꽃 숲 ・ 심리 테스트</div>

        <h1>
          나의 마음을
          <span class="line2">알아보기</span>
          <span class="swish"></span>
        </h1>

        <p class="desc">
          간단한 테스트를 통해 나의 성격과 감정 상태를 더 자세히 알아보세요.
        </p>

        <div class="divider"></div>
        <div class="sub">벚꽃이 흩날리는 숲에서 나를 만나는 시간</div>

        <button class="start-btn">
          <span class="sparkle">✦</span>
          <span>테스트 시작하기</span>
          <span>→</span>
        </button>

        <div class="actions">
          <div class="soft-btn">
            <span>🍃</span>
            <span>성격 테스트</span>
          </div>

          <div class="soft-btn">
            <span>👥</span>
            <span>익명 커뮤니티</span>
          </div>
        </div>
      </section>

      <section class="right">
        <div class="bubble-tip">
          마음을 털어놓기…
          <span>하고 싶은 말을 이곳에 남겨보세요</span>
        </div>

        <button class="bubble" onclick="togglePanel()" aria-label="Open treehole panel">
          <span class="bubble-icon">💬</span>
        </button>

        <div class="panel" id="panel">
          <div class="panel-head">
            <div class="panel-title">🌸 마음을 털어놓기</div>
            <button class="close" onclick="togglePanel()">×</button>
          </div>

          <div class="panel-sub">오늘의 마음을 조용히 남겨보세요 🌸</div>

          <textarea placeholder="오늘은 어떤 일이 있었나요?"></textarea>

          <div class="panel-footer">
            <button class="send">보내기</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <!-- jhammann/sakura 벚꽃 플러그인 JS -->
  <script src="https://cdn.jsdelivr.net/npm/sakura-js@1.1.1/dist/sakura.min.js"></script>

  <script>
    function togglePanel(){
      document.getElementById('panel').classList.toggle('show');
    }

    const sakura = new Sakura('body', {
      className: 'sakura',
      fallSpeed: 1.1,
      maxSize: 14,
      minSize: 8,
      delay: 260,
      colors: [
        {
          gradientColorStart: 'rgba(255, 238, 245, 0.95)',
          gradientColorEnd: 'rgba(255, 176, 207, 0.9)',
          gradientColorDegree: 120,
        },
        {
          gradientColorStart: 'rgba(255, 218, 231, 0.95)',
          gradientColorEnd: 'rgba(233, 145, 183, 0.88)',
          gradientColorDegree: 120,
        },
        {
          gradientColorStart: 'rgba(255, 248, 251, 0.95)',
          gradientColorEnd: 'rgba(246, 188, 213, 0.86)',
          gradientColorDegree: 120,
        }
      ]
    });
  </script>
</body>
</html>
