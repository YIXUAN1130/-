<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cherry Blossom Psychology</title>
  <style>
    :root{
      --text-main:#866b79;
      --text-soft:#967d89;
      --line:rgba(215,186,198,.55);
      --glass:rgba(255,245,248,.18);
      --glass-soft:rgba(255,245,248,.08);
      --btn1:#cdbaf4;
      --btn2:#d98fad;
      --white-soft:rgba(255,250,251,.78);
      --white-border:rgba(233,210,220,.7);
      --shadow:0 16px 40px rgba(140,95,118,.16);
      --shadow-soft:0 10px 28px rgba(140,95,118,.1);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      width:100%;
      height:100%;
    }

    body{
      font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--text-main);
      background:
        linear-gradient(rgba(255,244,248,.04), rgba(255,244,248,.04)),
        url("./0.png") center center / cover no-repeat;
      overflow:hidden;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          to right,
          rgba(255,246,249,.26) 0%,
          rgba(255,246,249,.16) 30%,
          rgba(255,246,249,.08) 52%,
          rgba(255,246,249,.02) 68%,
          rgba(255,246,249,0) 100%
        );
      pointer-events:none;
      z-index:0;
    }

    /* 更接近参考图的左侧雾化，而不是一整块硬玻璃板 */
    .left-fog{
      position:absolute;
      left:0;
      top:0;
      width:48%;
      height:100%;
      backdrop-filter:blur(30px);
      -webkit-backdrop-filter:blur(30px);
      background:
        linear-gradient(
          to right,
          rgba(255,246,249,.34) 0%,
          rgba(255,246,249,.22) 35%,
          rgba(255,246,249,.1) 68%,
          rgba(255,246,249,0) 100%
        );
      -webkit-mask-image:linear-gradient(
        to right,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,.96) 52%,
        rgba(0,0,0,.45) 82%,
        rgba(0,0,0,0) 100%
      );
      mask-image:linear-gradient(
        to right,
        rgba(0,0,0,1) 0%,
        rgba(0,0,0,.96) 52%,
        rgba(0,0,0,.45) 82%,
        rgba(0,0,0,0) 100%
      );
      pointer-events:none;
      z-index:1;
    }

    .page{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      padding:34px 42px 42px;
    }

    .logo{
      position:absolute;
      left:46px;
      top:34px;
      display:flex;
      align-items:center;
      gap:10px;
      font-size:19px;
      font-weight:600;
      letter-spacing:1px;
      color:rgba(126,101,114,.82);
    }

    .logo-box{
      width:22px;
      height:22px;
      border:2px solid rgba(126,101,114,.74);
      border-radius:7px;
      position:relative;
      display:inline-block;
    }

    .logo-box::after{
      content:"";
      position:absolute;
      inset:4px;
      border:2px solid rgba(126,101,114,.45);
      border-radius:4px;
    }

    .layout{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      position:relative;
    }

    .left{
      width:420px;
      margin-left:86px;
      margin-top:16px;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      position:relative;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      padding:10px 18px;
      border-radius:999px;
      background:rgba(255,247,250,.34);
      border:1px solid rgba(233,213,221,.72);
      color:rgba(147,118,131,.8);
      font-size:13px;
      letter-spacing:2px;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow-soft);
      margin-bottom:28px;
    }

    h1{
      font-family:Georgia,"Times New Roman",serif;
      font-size:68px;
      line-height:.96;
      font-weight:500;
      letter-spacing:-1.2px;
      color:#8c7180;
      margin-bottom:22px;
      position:relative;
    }

    h1 .line2{
      display:block;
      margin-top:6px;
    }

    .swish{
      position:absolute;
      left:116px;
      bottom:-10px;
      width:210px;
      height:24px;
      border-bottom:2px solid rgba(233,170,194,.62);
      border-radius:0 0 160px 160px;
      transform:rotate(-5deg);
      opacity:.9;
    }

    .swish::after{
      content:"✿";
      position:absolute;
      right:-10px;
      top:7px;
      font-size:22px;
      color:rgba(232,165,192,.85);
    }

    .desc{
      font-size:17px;
      line-height:1.65;
      color:var(--text-soft);
      max-width:330px;
      margin-bottom:18px;
    }

    .divider{
      display:flex;
      align-items:center;
      gap:16px;
      color:rgba(152,125,137,.82);
      font-size:15px;
      margin:10px 0 14px;
    }

    .divider::before,
    .divider::after{
      content:"";
      width:72px;
      height:1px;
      background:var(--line);
    }

    .sub{
      font-size:15px;
      color:var(--text-soft);
      margin-bottom:28px;
    }

    .start-btn{
      border:none;
      cursor:pointer;
      min-width:230px;
      padding:16px 32px;
      border-radius:999px;
      color:#fff;
      font-size:17px;
      font-weight:600;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      background:linear-gradient(90deg,var(--btn1),var(--btn2));
      box-shadow:0 14px 34px rgba(210,151,180,.25);
      transition:.25s ease;
      margin-bottom:28px;
    }

    .start-btn:hover{
      transform:translateY(-2px);
      filter:brightness(1.03);
      box-shadow:0 18px 40px rgba(210,151,180,.3);
    }

    .start-btn .sparkle{
      font-size:16px;
      opacity:.95;
    }

    .actions{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .soft-btn{
      min-width:184px;
      padding:14px 22px;
      border-radius:999px;
      background:rgba(255,250,251,.78);
      border:1px solid var(--white-border);
      color:#8b7280;
      font-size:15px;
      font-weight:500;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      backdrop-filter:blur(12px);
      box-shadow:var(--shadow-soft);
    }

    .right{
      flex:1;
      height:100%;
      position:relative;
    }

    .bubble-tip{
      position:absolute;
      right:140px;
      bottom:64px;
      text-align:right;
      color:rgba(255,243,247,.92);
      text-shadow:0 2px 10px rgba(125,94,108,.14);
      font-size:14px;
      line-height:1.55;
    }

    .bubble-tip span{
      display:block;
      font-size:13px;
      margin-top:4px;
      opacity:.92;
    }

    .bubble{
      position:absolute;
      right:42px;
      bottom:38px;
      width:84px;
      height:84px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      background:rgba(255,246,249,.32);
      border:1px solid rgba(255,240,244,.52);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:0 10px 30px rgba(185,145,166,.16);
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.22s ease;
      overflow:hidden;
    }

    .bubble::before{
      content:"";
      position:absolute;
      inset:-8px;
      border-radius:50%;
      border:1px solid rgba(255,245,249,.34);
      animation:pulse 2.6s infinite ease-out;
    }

    .bubble:hover{
      transform:scale(1.08);
      background:rgba(255,246,249,.42);
      box-shadow:0 14px 34px rgba(185,145,166,.22);
    }

    .bubble:active{
      transform:scale(.96);
    }

    .bubble-icon{
      width:50px;
      height:50px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(180deg, rgba(255,220,230,.78), rgba(244,188,209,.72));
      box-shadow:inset 0 2px 8px rgba(255,255,255,.28);
      color:#fff;
      font-size:22px;
      z-index:1;
    }

    .panel{
      position:absolute;
      right:64px;
      bottom:140px;
      width:332px;
      border-radius:28px;
      padding:22px 22px 20px;
      background:rgba(255,244,247,.58);
      border:1px solid rgba(255,240,244,.78);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:0 22px 48px rgba(168,128,149,.16);
      color:#866b79;
      opacity:0;
      transform:translateY(24px) scale(.96);
      pointer-events:none;
      transition:opacity .32s ease, transform .32s ease;
    }

    .panel.show{
      opacity:1;
      transform:translateY(0) scale(1);
      pointer-events:auto;
    }

    .panel-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      margin-bottom:10px;
    }

    .panel-title{
      font-size:28px;
      font-weight:700;
      color:#7d6270;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .panel-sub{
      font-size:15px;
      line-height:1.5;
      color:#9b808d;
      margin-bottom:14px;
    }

    .close{
      border:none;
      background:transparent;
      color:#aa8d9a;
      font-size:28px;
      line-height:1;
      cursor:pointer;
    }

    .panel textarea{
      width:100%;
      height:146px;
      resize:none;
      outline:none;
      border-radius:20px;
      border:1px solid rgba(232,215,221,.92);
      background:rgba(255,251,252,.8);
      padding:16px;
      color:#7f6774;
      font-size:15px;
      line-height:1.7;
      font-family:inherit;
      margin-bottom:16px;
    }

    .panel textarea::placeholder{
      color:#b59ca8;
    }

    .panel-footer{
      display:flex;
      justify-content:flex-end;
    }

    .send{
      border:none;
      cursor:pointer;
      padding:12px 24px;
      border-radius:999px;
      color:white;
      font-size:15px;
      font-weight:600;
      background:linear-gradient(90deg,#f0bed1,#d88dad);
      box-shadow:0 10px 22px rgba(216,141,173,.22);
    }

    @keyframes pulse{
      0%{
        opacity:.5;
        transform:scale(.92);
      }
      70%{
        opacity:0;
        transform:scale(1.26);
      }
      100%{
        opacity:0;
        transform:scale(1.26);
      }
    }

    @media (max-width: 1100px){
      .left{
        width:370px;
        margin-left:34px;
      }

      h1{
        font-size:58px;
      }

      .panel{
        width:300px;
      }
    }

    @media (max-width: 900px){
      .page{
        padding:24px;
      }

      .left-fog{
        width:58%;
      }

      .left{
        width:320px;
        margin-left:8px;
      }

      h1{
        font-size:48px;
      }

      .actions{
        flex-direction:column;
        width:100%;
      }

      .soft-btn{
        min-width:0;
        width:100%;
      }

      .bubble-tip{
        display:none;
      }
    }
  </style>
</head>
<body>
  <div class="left-fog"></div>

  <div class="page">
    <div class="logo">
      <span class="logo-box"></span>
      <span>LOGO</span>
    </div>

    <div class="layout">
      <section class="left">
        <div class="tag">FOREST ・ PSYCHOLOGY</div>

        <h1>
          Discover Your
          <span class="line2">Personality</span>
          <span class="swish"></span>
        </h1>

        <p class="desc">Find out more about yourself with our test.</p>

        <div class="divider"></div>
        <div class="sub">당신의 성격을 알아보세요</div>

        <button class="start-btn">
          <span class="sparkle">✦</span>
          <span>Start Quiz</span>
          <span>→</span>
        </button>

        <div class="actions">
          <div class="soft-btn"><span>🍃</span><span>Personality Test</span></div>
          <div class="soft-btn"><span>👥</span><span>Community Chat</span></div>
        </div>
      </section>

      <section class="right">
        <div class="bubble-tip">
          向树洞倾诉…
          <span>把你的心里话放在这里</span>
        </div>

        <button class="bubble" onclick="togglePanel()" aria-label="Open treehole panel">
          <span class="bubble-icon">💬</span>
        </button>

        <div class="panel" id="panel">
          <div class="panel-head">
            <div class="panel-title">🌸 向树洞倾诉</div>
            <button class="close" onclick="togglePanel()">×</button>
          </div>

          <div class="panel-sub">把你的心里话告诉这里吧 🌸</div>

          <textarea placeholder="今天发生了什么呢？"></textarea>

          <div class="panel-footer">
            <button class="send">发送</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    function togglePanel(){
      document.getElementById('panel').classList.toggle('show');
    }
  </script>
</body>
</html>
